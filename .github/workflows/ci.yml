name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Add ubuntugis PPA
        run: |
          sudo add-apt-repository ppa:ubuntugis/ubuntugis-unstable -y
          sudo apt-get update

      - name: Install system GDAL
        run: |
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Export GDAL environment
        run: |
          echo "GDAL_VERSION=$(gdal-config --version)"
          echo "GDAL_CONFIG=$(which gdal-config)" >> $GITHUB_ENV
          echo "GDAL_DATA=$(gdal-config --datadir)" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install "GDAL==$(gdal-config --version)"

      - name: Verify GDAL version
        run: |
          gdalinfo --version
          python -c "import osgeo.gdal as gdal; print(gdal.VersionInfo())"

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/ -v --tb=short
