name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-task1:
    name: Task 1 – Path Tracing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task1-path-tracing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: task1-path-tracing/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/ -v --tb=short

      - name: Run integration test (synthetic dataset)
        env:
          PYTHONPATH: src
        run: |
          python tests/integration/test_task1_synthetic.py

  test-task2:
    name: Task 2 – Viewsheds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task2-viewsheds

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: task2-viewsheds/requirements.txt

      - name: Install required libgdal version
        run: |
          sudo add-apt-repository -y ppa:ubuntugis/ubuntugis-unstable
          sudo apt-get update
          sudo apt-get install -y libgdal-dev
          gdal-config --version

      - name: Install Python dependencies
        run: |
          GDAL_VERSION=$(gdal-config --version)
          pip install -r requirements.txt
          pip install "GDAL==${GDAL_VERSION}"

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
