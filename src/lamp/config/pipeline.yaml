dataset:
  dem_path: "task1-path-tracing/Task_1/DEM_Subset-Original.tif"
  sar_path: "task1-path-tracing/Task_1/SAR-MS.tif"
  marks_path: "task1-path-tracing/Task_1/Marks_Brief1.shp"
  buildings_path: "task1-path-tracing/Task_1/BuildingFootprints.shp"
  known_paths_train: "task1-path-tracing/known_paths_train.shp"
  known_paths_eval: "task1-path-tracing/known_paths_eval.shp"

ml_training:
  rf_estimators: 100
  buffer_m: 2.25
  neg_pos_ratio: 4.0
  learning_rate: 0.05
  seed: 11

simulation:
  samples_per_pair: 128
  top_k_paths: 12
  noise_temperature: 0.08
  cost_weights:
    slope: 0.55
    roughness: 0.30
    surface: 0.10
    path_prior: 0.05

viewshed:
  observer_height_m: 2.0
  target_height_m: 0.0
  max_distance_m: 2000.0
  aperture_m: 1.0
  aperture_samples: 8
  mode: "3d_mesh"

performance:
  n_workers: 4
  use_gpu: false
  max_leaf_size: 4
