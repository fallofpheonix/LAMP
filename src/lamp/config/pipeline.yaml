dataset:
  dem_path: "data-briefs/task1/DEM_Subset-Original.tif"
  sar_path: "data-briefs/task1/SAR-MS.tif"
  marks_path: "data-briefs/task1/Marks_Brief1.shp"
  buildings_path: "data-briefs/task1/BuildingFootprints.shp"
  known_paths_train: null
  known_paths_eval: null

ml_training:
  rf_estimators: 100
  buffer_m: 2.25
  neg_pos_ratio: 4.0
  learning_rate: 0.05
  seed: 11

simulation:
  samples_per_pair: 128
  top_k_paths: 12
  noise_temperature: 0.08
  cost_w_slope: 0.55
  cost_w_roughness: 0.30
  cost_w_surface: 0.10
  cost_w_path_prior: 0.05
  cost_w_visibility: 0.0
  calibrate_weights: false
  compare_visibility_coupling: false

viewshed:
  visibility_raster: "outputs/viewshed_probability.tif"
  visibility_source: "deterministic"
  observer_height_m: 2.0
  target_height_m: 0.0
  max_distance_m: 2000.0
  aperture_m: 1.0
  aperture_samples: 8
  mode: "3d_mesh"

performance:
  n_workers: 4
  use_gpu: false
  max_leaf_size: 4
